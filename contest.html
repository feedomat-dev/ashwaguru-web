<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BhejaFry Contest</title>
    
    <style>
        /* FIX 1: Erase browser margins and set background to Dark Mode */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0E1117; 
        }

        /* FIX 2: Make the iframe stretch perfectly to the edges */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* FIX 3: Floating Top Right Container */
        .top-right-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        /* FIX 4: Premium "Back" Button Styling */
        .back-button {
            background-color: #1F2937;
            color: #ffffff;
            border: 1px solid #374151;
            padding: 8px 14px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .back-button:hover {
            transform: scale(1.05);
            background-color: #374151;
        }
    </style>
</head>
<body>
    <iframe src="https://ashwaguru-tipster-contest.hf.space/?embed=true&embed_options=dark_theme" width="100%" height="800"></iframe>

    <div class="top-right-buttons">
        <a href="index.html" class="back-button">
            👈 Ashwa Guru Terminal
        </a>
    </div>
</body>
</html>
