<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BhejaFry Contest</title>
    
    <style>
        /* FIX 1: Erase browser margins and set background to Dark Mode */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0E1117; 
        }

        /* FIX 2: Make the iframe stretch perfectly to the edges */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* FIX 3: Floating Top Right Container */
        .top-right-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        /* FIX 4: Premium "Back" Button Styling */
        .back-button {
            background-color: #1F2937;
            color: #ffffff;
            border: 1px solid #374151;
            padding: 8px 14px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .back-button:hover {
            transform: scale(1.05);
            background-color: #374151;
        }
    </style>
</head>
<body>
    <!-- 1. Your Custom Back Button (Untouched) -->
    <div class="top-right-buttons">
        <a href="index.html" class="back-button">
            👈 Ashwa Guru Terminal
        </a>
    </div>

    <!-- 2. The Login Screen (Only shows if they haven't logged in) -->
    <div id="login-container" style="text-align: center; margin-top: 50px; font-family: sans-serif; color: white;">
        <h2>🔒 Bhejafry GallopIQ</h2>
        <p>Please enter the global contest password.</p>
        <input type="password" id="contest-password" placeholder="Password" style="padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px;">
        <br>
        <button onclick="checkPassword()" style="padding: 10px 20px; font-size: 16px; background-color: #FF4B4B; color: white; border: none; border-radius: 5px; cursor: pointer;">Enter</button>
        <p id="error-msg" style="color: #FF4B4B; display: none; margin-top: 10px;">❌ Incorrect Password</p>
    </div>

    <!-- 3. The Container where the Iframe will load AFTER login -->
    <div id="app-container" style="display: none;"></div>

    <!-- 4. The Brains (Javascript) -->
    <script>
        const correctPassword = "1bheja@fry";
        
        // This is the VIP URL that bypasses the Streamlit lock
        const hfAppUrl = "https://ashwaguru-tipster-contest.hf.space/?embed=true&embed_options=dark_theme&auth=bhejafry_unlocked";

        // Check the browser's Local Storage immediately
        if (localStorage.getItem("bhejafry_access") === "granted") {
            loadApp();
        }

        // Check password when button is clicked
        function checkPassword() {
            const guess = document.getElementById("contest-password").value;
            if (guess === correctPassword) {
                localStorage.setItem("bhejafry_access", "granted");
                loadApp();
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        // Hide login and inject the iframe
        function loadApp() {
            document.getElementById("login-container").style.display = "none";
            document.getElementById("app-container").style.display = "block";
            document.getElementById("app-container").innerHTML = `<iframe src="${hfAppUrl}" width="100%" height="800" style="border:none;"></iframe>`;
        }
    </script>
</body>
</html>
